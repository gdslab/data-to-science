[pytest]
testpaths = app/tests

# Run the suite in parallel by default. ``--dist loadgroup`` honours the
# ``xdist_group`` markers used to confine tests that share an external resource
# (e.g. the STAC catalog) to a single worker. Override with ``-n0`` for serial
# runs while debugging a single test.
addopts = -n auto --dist loadgroup

markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
