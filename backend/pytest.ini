[pytest]
testpaths = app/tests

# Run the suite in parallel by default. ``--dist loadgroup`` honours the
# ``xdist_group`` markers used to confine tests that share an external resource
# (e.g. the STAC catalog) to a single worker. Override with ``-n0`` for serial
# runs while debugging a single test.
addopts = -n auto --dist loadgroup

markers =
    slow: marks tests as slow (deselect with '-m "not slow"')

filterwarnings =
    # passlib is unmaintained and imports the stdlib crypt module removed in
    # Python 3.13; remove when we migrate off passlib.
    ignore:'crypt' is deprecated:DeprecationWarning
    # Raised inside rasterio/numpy.ma masked reads under NumPy 2.5; remove
    # once a rasterio release compatible with NumPy 2.5 is in the lock file.
    ignore:Setting the shape on a NumPy array has been deprecated:DeprecationWarning
